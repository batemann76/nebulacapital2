<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nebula Capital | Investment & Advisory</title>
  <meta name="description" content="Nebula Capital — Investment & Advisory — José Abascal, 41 Madrid" />

  <style>
    /* ===== Local fonts (served from /fonts) ===== */
    @font-face{
      font-family: "Nebula Serif";
      src: url("./fonts/CormorantGaramond-Medium.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face{
      font-family: "Nebula Serif";
      src: url("./fonts/CormorantGaramond-SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root{
      --green: #14311f;     /* English green */
      --ink: #e7e3d3;       /* ivory */
      --border: rgba(231,227,211,.55);
      --border2: rgba(231,227,211,.35);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      display:grid;
      place-items:center;
      background:#0e2416;
      font-family: "Nebula Serif", Georgia, "Times New Roman", serif;
    }

    /* Cover / hero card */
    .cover{
      width: min(1100px, calc(100vw - 48px));
      aspect-ratio: 16 / 9;
      border-radius: 22px;
      position: relative;
      overflow: hidden;

      background:
        radial-gradient(120% 120% at 50% 10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(140% 140% at 50% 90%, rgba(0,0,0,.25), transparent 55%),
        linear-gradient(0deg, rgba(0,0,0,.10), rgba(0,0,0,.10)),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.025) 0px,
          rgba(255,255,255,.025) 1px,
          rgba(0,0,0,.00) 2px,
          rgba(0,0,0,.00) 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.012) 0px,
          rgba(255,255,255,.012) 1px,
          rgba(0,0,0,.00) 2px,
          rgba(0,0,0,.00) 6px
        ),
        var(--green);

      box-shadow:
        0 30px 70px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.05);
    }

    /* Double border */
    .cover::before,
    .cover::after{
      content:"";
      position:absolute;
      inset: 34px;
      border: 2px solid var(--border);
      border-radius: 16px;
      pointer-events:none;
    }
    .cover::after{
      inset: 54px;
      border: 1px solid var(--border2);
      border-radius: 14px;
    }

    /* Centered layout */
    .content{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-rows: 1fr auto 1fr;
      align-items:center;
      justify-items:center;
      padding: 72px 64px;
      text-align:center;
      color: var(--ink);
    }

    .brand{
      letter-spacing: .08em;
      font-weight: 600;
      font-size: clamp(44px, 5.2vw, 84px);
      text-transform: uppercase;
      line-height: 1.05;
      margin:0;
    }

    .tagline{
      margin-top: 12px;
      font-weight: 500;
      font-size: clamp(26px, 2.6vw, 44px);
      letter-spacing: .02em;
    }

    .address{
      align-self:end;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: clamp(22px, 2.0vw, 36px);
      letter-spacing: .02em;
      opacity: .95;
    }

    @media (max-width: 520px){
      .content{ padding: 56px 22px; }
      .cover::before{ inset: 22px; }
      .cover::after{ inset: 36px; }
    }
  </style>
</head>

<body>
  <main class="cover" aria-label="Nebula Capital cover">
    <div class="content">
      <div></div>

      <div>
        <h1 class="brand">NEBULA CAPITAL</h1>
        <div class="tagline">Investment &amp; Advisory</div>
      </div>

      <div class="address">José Abascal, 41 Madrid</div>
    </div>
  </main>
</body>
</html>
